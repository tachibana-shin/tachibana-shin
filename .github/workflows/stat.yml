name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=tachibana-shin&repo=hako-epub-extension&theme=dark&description_lines_count=3
          path: profile/hako-epub-extension.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=tachibana-shin&repo=rakuyomi&theme=dark&description_lines_count=3
          path: profile/rakuyomi.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=tachibana-shin&repo=kosync-typescript&theme=dark&description_lines_count=3
          path: profile/kosync-typescript.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=tachibana-shin&repo=cuutruyen_decryper&theme=dark&description_lines_count=3
          path: profile/cuutruyen_decryper.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
